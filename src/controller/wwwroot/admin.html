<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Recastify — Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-primary: #000000;
            --card-bg: #000000;
            --modal-bg: #0b0b0b;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-green: #ff453a; /* Map coral-red to actions */
            --accent-yellow: #ffcc00;
            --accent-red: #ff453a;
            --border-color: #222222;
            --bg-hover: #111111;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
            padding: 0 16px;
            background: #000000;
            border-bottom: 1px solid var(--border-color);
        }

        .admin-header h1 {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .admin-header a {
            color: var(--accent-green);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s ease;
        }

        .admin-header a:hover {
            opacity: 0.8;
        }

        .admin-body {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 120px;
        }

        /* Settings Card & Toggle switch */
        .global-settings-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .settings-info {
            flex: 1;
        }

        .settings-info h3 {
            font-size: 14px;
            font-weight: 700;
            margin: 0 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .settings-info p {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
            margin: 0;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 28px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #111111;
            transition: .2s ease;
            border-radius: 0px;
            border: 1px solid #333333;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: #ffffff;
            transition: .2s ease;
            border-radius: 0px;
        }

        input:checked + .slider {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .btn-add {
            display: block;
            width: 100%;
            min-height: 44px;
            background: var(--accent-green);
            color: #ffffff;
            border: 1px solid var(--accent-green);
            border-radius: 0px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
            cursor: pointer;
            margin-bottom: 16px;
            transition: opacity 0.2s ease;
        }

        .btn-add:active {
            opacity: 0.8;
            background: #e03b32;
            border-color: #e03b32;
        }

        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .admin-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .bridge-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 0px;
            flex-shrink: 0;
        }

        .bridge-status-dot.playing {
            background: var(--accent-green);
        }

        .bridge-status-dot.paused, .bridge-status-dot.starting {
            background: var(--accent-yellow);
        }

        .bridge-status-dot.offline {
            background: #444444;
        }

        .admin-card-header .bridge-name {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
        }

        .bridge-state-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 6px;
            border: 1px solid currentColor;
            border-radius: 0px;
        }

        .bridge-state-label.playing {
            color: var(--accent-green);
            background: transparent;
        }

        .bridge-state-label.paused, .bridge-state-label.starting {
            color: var(--accent-yellow);
            background: transparent;
        }

        .bridge-state-label.offline {
            color: var(--text-secondary);
            background: transparent;
        }

        .admin-card-detail {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .admin-card-detail code {
            background: rgba(255,255,255,0.05);
            padding: 2px 4px;
            border-radius: 0px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .admin-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .btn-sm {
            min-height: 38px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid var(--border-color);
            border-radius: 0px;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-sm:active {
            opacity: 0.8;
        }

        .btn-edit { 
            background: #000000; 
            color: var(--text-primary); 
            border: 1px solid var(--border-color); 
        }
        .btn-edit:active {
            background: #111111;
        }
        
        .btn-start { 
            background: var(--accent-green); 
            color: #ffffff; 
            border: 1px solid var(--accent-green);
        }
        .btn-start:active {
            background: #e03b32;
            border-color: #e03b32;
        }

        .btn-stop { 
            background: var(--accent-yellow); 
            color: #000000; 
            border: 1px solid var(--accent-yellow);
        }
        .btn-stop:active {
            background: #e6b800;
            border-color: #e6b800;
        }

        .btn-delete { 
            background: #000000; 
            color: var(--accent-green); 
            border: 1px solid var(--accent-green); 
        }
        .btn-delete:active {
            background: var(--accent-green);
            color: #ffffff;
        }

        /* Warning & Deploy Guides */
        .deployment-notice {
            background: #080808;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-yellow);
            border-radius: 0px;
            padding: 16px;
            margin-top: 24px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .deployment-notice h3 {
            color: var(--accent-yellow);
            font-size: 14px;
            font-weight: 700;
            margin: 0 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .deployment-notice p {
            color: var(--text-primary);
            line-height: 1.45;
            margin: 0 0 8px;
        }

        .deployment-notice p:last-of-type {
            margin-bottom: 0;
        }

        .docker-guide {
            background: #080808;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-green);
            border-radius: 0px;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .docker-guide h3 {
            color: var(--accent-green);
            font-size: 14px;
            font-weight: 700;
            margin: 0 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .docker-guide p {
            color: var(--text-secondary);
            line-height: 1.45;
            margin: 0 0 8px;
        }

        .docker-guide pre {
            background: #000000;
            border: 1px solid var(--border-color);
            border-radius: 0px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
            color: #d4d4d4;
        }

        .icecast-status {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0px;
            padding: 12px 16px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Modal Overlay and Premium Card dialogs */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 0px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .modal h2 {
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 16px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            background: #000000;
            border: 1px solid var(--border-color);
            border-radius: 0px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            min-height: 44px;
            border: none;
            border-radius: 0px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .btn-cancel { 
            background: #000000; 
            color: var(--text-primary); 
            border: 1px solid var(--border-color) !important; 
        }
        .btn-cancel:active {
            background: #111111;
        }

        .btn-save { 
            background: var(--accent-green); 
            color: #ffffff; 
            border: 1px solid var(--accent-green) !important; 
        }
        .btn-save:active {
            background: #e03b32;
        }
</head>
<body>
    <header class="admin-header">
        <h1>Recastify Manager</h1>
        <a href="/">iPod View</a>
    </header>

    <div class="admin-body">
        <!-- Low Latency switch toggle -->
        <div class="global-settings-card">
            <div class="settings-info">
                <h3>Low-Latency Streaming</h3>
                <p>Bypasses C# proxy (reduces latency, but might mute standalone iOS PWAs).</p>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-proxy" onchange="toggleStreamProxy(this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-add" id="btn-add" type="button">+ Add Bridge</button>

        <div id="bridge-list">
            <!-- Populated by JS -->
        </div>

        <div class="deployment-notice">
            <h3>⚠️ Deployment Notice: Multi-Bridge Provisioning</h3>
            <p>Registering a bridge in this UI writes its parameters to <code>config.yaml</code>, but <strong>does not automatically launch or configure the matching Docker container</strong>.</p>
            <p>For each registered bridge to go online and advertise over AirPlay, a corresponding Docker service definition must be active in your deployment stack.</p>
            <button class="btn-sm btn-edit" id="btn-toggle-guide" style="margin-top: 10px; display: inline-block; width: auto;" onclick="toggleGuide()">Show Docker Compose Guide</button>
        </div>

        <div class="docker-guide hidden" id="docker-guide">
            <h3>🛠️ Docker Compose Service Template</h3>
            <p>Insert the following service blocks under the <code>services:</code> section of your <code>docker-compose.yml</code> file. Adjust environment parameters to match each bridge definition:</p>
            <pre><code>  bridge-YOUR-BRIDGE-ID:
    image: ghcr.io/kiwiprojekt/recastify:main
    container_name: bridge-YOUR-BRIDGE-ID
    restart: unless-stopped
    depends_on:
      - icecast
      - mqtt
    cap_add:
      - SYS_NICE
    networks:
      airplay:
        ipv4_address: YOUR-CONTAINER-IP
    volumes:
      - ./config/shairport-sync.conf.template:/opt/config/shairport-sync.conf.template:ro
    environment:
      AIRPLAY_NAME: "YOUR-AIRPLAY-NAME"
      ICECAST_HOST: "icecast"
      ICECAST_PORT: "8000"
      ICECAST_SOURCE_PASSWORD: "YOUR-ICECAST-SOURCE-PASSWORD"
      ICECAST_MOUNT: "YOUR-ICECAST-MOUNT"
      AUDIO_BITRATE: "YOUR-BITRATE"
      BRIDGE_ID: "YOUR-BRIDGE-ID"
      CONTROLLER_URL: "controller:3000"
      MQTT_HOST: "mqtt"</code></pre>
            <p style="margin-top: 10px; font-size: 12px; color: var(--text-secondary);">After updating your compose file, deploy the changes using <code>docker compose up -d</code> to provision the receiver containers.</p>
        </div>

        <div id="icecast-status" class="icecast-status"></div>
    </div>

    <!-- Modal dialogue box -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Add Bridge</h2>
            <div class="form-group">
                <label for="f-name">AirPlay Name</label>
                <input type="text" id="f-name" placeholder="Living Room">
            </div>
            <div class="form-group">
                <label for="f-mount">Icecast Mount</label>
                <input type="text" id="f-mount" placeholder="/living-room">
            </div>
            <div class="form-group">
                <label for="f-ip">Container IP (ipvlan)</label>
                <input type="text" id="f-ip" placeholder="192.168.1.101">
            </div>
            <div class="form-group">
                <label for="f-bitrate">MP3 Bitrate</label>
                <select id="f-bitrate">
                    <option value="128k">128k</option>
                    <option value="192k">192k</option>
                    <option value="256k">256k</option>
                    <option value="320k" selected>320k</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" type="button" id="btn-cancel">Cancel</button>
                <button class="btn-save" type="button" id="btn-save">Save</button>
            </div>
        </div>
    </div>

    <script>
        var bridgeListEl = document.getElementById('bridge-list');
        var icecastStatusEl = document.getElementById('icecast-status');
        var modalOverlay = document.getElementById('modal-overlay');
        var modalTitle = document.getElementById('modal-title');
        var fName = document.getElementById('f-name');
        var fMount = document.getElementById('f-mount');
        var fIp = document.getElementById('f-ip');
        var fBitrate = document.getElementById('f-bitrate');
        var btnAdd = document.getElementById('btn-add');
        var btnCancel = document.getElementById('btn-cancel');
        var btnSave = document.getElementById('btn-save');

        var editingId = null;
        var refreshTimer = null;

        function fetchBridges() {
            fetch('/api/bridges')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    renderBridges(data.bridges);
                    renderIcecastStatus(data.bridges);
                    // Sync the toggle switch state
                    var toggleProxy = document.getElementById('toggle-proxy');
                    if (toggleProxy) {
                        toggleProxy.checked = !!data.disable_stream_proxy;
                    }
                })
                .catch(function() {});
        }

        function renderBridges(bridges) {
            var html = '';
            for (var i = 0; i < bridges.length; i++) {
                var b = bridges[i];
                var stateClass = b.state === 'playing' ? 'playing' : (b.state === 'paused' || b.state === 'starting' ? 'paused' : 'offline');
                var stateLabel = b.state || 'offline';
                html += '<div class="admin-card">';
                html += '<div class="admin-card-header">';
                html += '<div class="bridge-status-dot ' + stateClass + '"></div>';
                html += '<span class="bridge-name">' + escapeHtml(b.name) + '</span>';
                html += '<span class="bridge-state-label ' + stateClass + '">' + stateLabel + '</span>';
                html += '</div>';
                html += '<div class="admin-card-detail">Mount: <code>' + escapeHtml(b.mount) + '</code></div>';
                if (b.ip) html += '<div class="admin-card-detail">IP: <code>' + escapeHtml(b.ip) + '</code></div>';
                html += '<div class="admin-card-detail">Bitrate: ' + escapeHtml(b.bitrate) + ' &middot; Listeners: ' + b.listeners + '</div>';
                html += '<div class="admin-card-actions">';
                html += '<button class="btn-sm btn-edit" onclick="editBridge(\'' + escapeAttr(b.id) + '\')">Edit</button>';
                if (b.state === 'offline' || b.state === 'paused') {
                    html += '<button class="btn-sm btn-start" onclick="startBridge(\'' + escapeAttr(b.id) + '\')">Start</button>';
                } else {
                    html += '<button class="btn-sm btn-stop" onclick="stopBridge(\'' + escapeAttr(b.id) + '\')">Stop</button>';
                }
                html += '<button class="btn-sm btn-delete" onclick="deleteBridge(\'' + escapeAttr(b.id) + '\')">Delete</button>';
                html += '</div>';
                html += '</div>';
            }
            bridgeListEl.innerHTML = html;
        }

        function renderIcecastStatus(bridges) {
            var active = 0;
            var totalListeners = 0;
            for (var i = 0; i < bridges.length; i++) {
                if (bridges[i].state === 'playing' || bridges[i].state === 'starting') active++;
                totalListeners += bridges[i].listeners || 0;
            }
            icecastStatusEl.textContent = 'Sources: ' + active + '/' + bridges.length + ' active \u00B7 Listeners: ' + totalListeners + ' total';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // Modal Controls
        function openModal(title, bridge) {
            modalTitle.textContent = title;
            fName.value = bridge ? bridge.name : '';
            fMount.value = bridge ? bridge.mount : '';
            fIp.value = bridge ? (bridge.ip || '') : '';
            fBitrate.value = bridge ? bridge.bitrate : '320k';
            editingId = bridge ? bridge.id : null;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            editingId = null;
        }

        btnAdd.addEventListener('click', function() {
            openModal('Add Bridge', null);
        });

        btnCancel.addEventListener('click', function() {
            closeModal();
        });

        btnSave.addEventListener('click', function() {
            var body = {
                name: fName.value,
                mount: fMount.value,
                ip: fIp.value || null,
                bitrate: fBitrate.value,
                enabled: true
            };

            if (editingId) {
                fetch('/api/bridges/' + encodeURIComponent(editingId), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                }).then(function() {
                    closeModal();
                    fetchBridges();
                });
            } else {
                fetch('/api/bridges', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                }).then(function() {
                    closeModal();
                    fetchBridges();
                });
            }
        });

        function editBridge(id) {
            fetch('/api/bridges')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    for (var i = 0; i < data.bridges.length; i++) {
                        if (data.bridges[i].id === id) {
                            openModal('Edit Bridge', data.bridges[i]);
                            return;
                        }
                    }
                });
        }

        function deleteBridge(id) {
            if (!confirm('Delete bridge "' + id + '"?')) return;
            fetch('/api/bridges/' + encodeURIComponent(id), {
                method: 'DELETE'
            }).then(function() {
                fetchBridges();
            });
        }

        function startBridge(id) {
            fetch('/api/bridges/' + encodeURIComponent(id) + '/start', {
                method: 'POST'
            }).then(function() {
                fetchBridges();
            });
        }

        function stopBridge(id) {
            fetch('/api/bridges/' + encodeURIComponent(id) + '/stop', {
                method: 'POST'
            }).then(function() {
                fetchBridges();
            });
        }

        function toggleGuide() {
            var guide = document.getElementById('docker-guide');
            var btn = document.getElementById('btn-toggle-guide');
            if (guide.classList.contains('hidden')) {
                guide.classList.remove('hidden');
                btn.textContent = 'Hide Docker Compose Guide';
            } else {
                guide.classList.add('hidden');
                btn.textContent = 'Show Docker Compose Guide';
            }
        }

        function toggleStreamProxy(disable) {
            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ disable_stream_proxy: disable })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                // Successfully toggled stream proxy in config
            })
            .catch(function() {
                var toggleProxy = document.getElementById('toggle-proxy');
                if (toggleProxy) toggleProxy.checked = !disable;
                alert('Failed to update streaming configuration.');
            });
        }

        // Initialize
        fetchBridges();
        refreshTimer = setInterval(fetchBridges, 5000);
    </script>
</body>
</html>
